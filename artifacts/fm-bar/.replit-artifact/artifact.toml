kind = "web"
previewPath = "/"
title = "FM Bar Comanda"
version = "1.0.0"
id = "artifacts/fm-bar"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24817

[services.development]
run = "pnpm --filter @workspace/fm-bar run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fm-bar", "run", "build" ]
publicDir = "artifacts/fm-bar/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24817"
BASE_PATH = "/"
